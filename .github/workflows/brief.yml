name: Morning & Afternoon Brief

on:
  schedule:
    - cron: "30 11 * * *"  # 6:30 AM CST (UTC-6)
    - cron: "0 17 * * *"   # 12:00 PM CST (UTC-5) / noon CDT
    - cron: "15 20 * * 1-5"  # 3:15 PM CST (UTC-5) weekdays only, right after market close
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - midday
          - afternoon

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # Use hour ranges instead of exact matches to handle GitHub Actions cron delays
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 10 ] && [ "$HOUR" -le 14 ]; then
              echo "mode=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge 15 ] && [ "$HOUR" -le 19 ]; then
              echo "mode=midday" >> $GITHUB_OUTPUT
            else
              echo "mode=afternoon" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run brief
        run: python main.py --mode ${{ steps.mode.outputs.mode }}
