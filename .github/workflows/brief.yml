name: Morning & Evening Brief

on:
  schedule:
    - cron: "30 11 * * *"  # 6:30 AM CST (UTC-6)
    - cron: "0 0 * * *"    # 7:00 PM CST (UTC-5) / evening CDT
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening

permissions:
  contents: write

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # Use hour ranges instead of exact matches to handle GitHub Actions cron delays
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 10 ] && [ "$HOUR" -le 14 ]; then
              echo "mode=morning" >> $GITHUB_OUTPUT
            else
              echo "mode=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run brief
        run: python main.py --mode ${{ steps.mode.outputs.mode }}

      - name: Save used quotes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_quotes.txt
          git diff --cached --quiet || git commit -m "Update used quotes [skip ci]"
          git push
