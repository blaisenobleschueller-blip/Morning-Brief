name: Morning & Afternoon Brief

on:
  schedule:
    - cron: "30 11 * * *"  # 6:30 AM CST (UTC-6)
    - cron: "0 17 * * *"   # 12:00 PM CST (UTC-5) / noon CDT
    - cron: "30 21 * * *"  # 4:30 PM CST (UTC-6)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - midday
          - afternoon

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "11" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "17" ]; then
            echo "mode=midday" >> $GITHUB_OUTPUT
          else
            echo "mode=afternoon" >> $GITHUB_OUTPUT
          fi

      - name: Run brief
        run: python main.py --mode ${{ steps.mode.outputs.mode }}
